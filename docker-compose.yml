version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blood
      POSTGRES_PASSWORD: blood123
      POSTGRES_DB: blood_dispatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blood"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8472:8472"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=blood
      - POSTGRES_PASSWORD=blood123
      - POSTGRES_DB=blood_dispatch
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3847:3847"
    depends_on:
      - backend

volumes:
  postgres_data:
